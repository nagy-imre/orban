<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Great Escape - Full Satire Edition</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; 
            font-family: 'Arial Black', sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh; 
            touch-action: manipulation;
        }
        #gameCanvas { 
            background-color: #5cacee; border: 3px solid #000;
            image-rendering: auto; height: 100vh; aspect-ratio: 9 / 16;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
        }
        #ui { 
            position: absolute; top: 5%; width: 100%; color: white; 
            text-align: center; user-select: none; pointer-events: none; 
            text-shadow: 3px 3px 10px rgba(0,0,0,1); z-index: 20; 
        }
        #scoreLabel { font-size: clamp(40px, 10vh, 80px); margin: 0; font-weight: 900; }
        #highScoreLabel { font-size: 18px; margin: 0; text-transform: uppercase; opacity: 0.8; }
        #message { font-size: 24px; margin-top: 15px; padding: 10px; border-radius: 10px; }
        #eventMessage { 
            position: absolute; bottom: 20%; width: 100%; color: #ffeb3b; 
            font-size: 28px; text-align: center; font-weight: bold; 
            text-shadow: 2px 2px 5px #000; z-index: 10; display: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <p id="highScoreLabel">Legjobb: 0</p>
        <h1 id="scoreLabel">0</h1>
        <div id="message">Kattints vagy Szóköz a harchoz!</div>
    </div>
    <div id="eventMessage"></div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = { 
        score: document.getElementById('scoreLabel'), 
        high: document.getElementById('highScoreLabel'), 
        msg: document.getElementById('message'), 
        event: document.getElementById('eventMessage') 
    };

    const CW = 360, CH = 640;
    canvas.width = CW; canvas.height = CH;

    // --- GAME CONSTANTS ---
    const GRAVITY = 0.45, FLAP = -8, PIPE_W = 75, PIPE_SPEED = 3.5, PIPE_SPAWN_MS = 1700;

    // --- AUDIO SYSTEM ---
    const sfx = {
        peter: new Audio('mi-vagyunk-magyar-peter.mp3'),
        lorinc: new Audio('hova-lett-a-penz.mp3'),
        question: new Audio('isthereanyquestion.mp3'),
        war: new Audio('the-problem-is-the-war.mp3'),
        money: new Audio('money.mp3')
    };

    function playSfx(clip) { 
        clip.currentTime = 0; 
        clip.play().catch(() => {}); 
    }
    
    function stopAllSfx() { 
        Object.values(sfx).forEach(s => { s.pause(); s.currentTime = 0; }); 
    }

    // --- ASSET LOADING ---
    const assets = { 
        ready: false, total: 4, loaded: 0, 
        imgs: { avatar: new Image(), peter: new Image(), lorinc: new Image(), eu: new Image() } 
    };
    
    function loadHandler() { 
        assets.loaded++; 
        if (assets.loaded === assets.total) assets.ready = true; 
    }
    
    assets.imgs.avatar.src = 'avatar.png'; 
    assets.imgs.peter.src = 'peter.png'; 
    assets.imgs.lorinc.src = 'lorinc.png'; 
    assets.imgs.eu.src = 'eu.png';
    
    Object.values(assets.imgs).forEach(img => img.onload = loadHandler);

    // --- GAME STATE ---
    let state = 'ready', score = 0, pipes = [], lastTime = 0, spawnTimer = 0;
    let bird = { x: 80, y: CH/2, v: 0, rot: 0, shielded: false, iFrames: 0 };
    let highScore = localStorage.getItem('orbanGameHighScore') || 0;
    ui.high.innerText = `Legjobb: ${highScore}`;

    let boss = { active: false, x: 500, y: 300, lastScore: 0 };
    let lorincItems = [], euItems = [], particles = [];

    function showEvent(text, color) {
        ui.event.innerText = text;
        ui.event.style.color = color;
        ui.event.style.display = 'block';
        setTimeout(() => ui.event.style.display = 'none', 2500);
    }

    // --- INPUT HANDLING ---
    function doAction() {
        if (!assets.ready) return;
        if (state === 'ready') { state = 'playing'; resetGame(); }
        else if (state === 'playing') { 
            bird.v = FLAP; 
            if (Math.random() < 0.04) playSfx(sfx.question);
        }
        else if (state === 'gameOver') { state = 'ready'; ui.msg.innerText = 'Kattints az új harchoz!'; }
    }

    window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); doAction(); } });
    canvas.addEventListener('mousedown', (e) => { e.preventDefault(); doAction(); });
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); doAction(); }, { passive: false });

    function resetGame() {
        score = 0; pipes = []; lorincItems = []; euItems = []; particles = [];
        bird.y = CH/2; bird.v = 0; bird.shielded = false; bird.iFrames = 0;
        boss.active = false; boss.lastScore = 0; boss.x = 500;
        ui.score.innerText = '0'; ui.msg.innerText = ''; ui.msg.style.background = 'none';
        stopAllSfx();
    }

    // --- MAIN UPDATE LOOP ---
    function update(dt) {
        if (!assets.ready || state !== 'playing') return;

        bird.v += GRAVITY * dt;
        bird.y += bird.v * dt;
        bird.rot = Math.min(Math.PI/4, Math.max(-Math.PI/4, bird.v * 0.1));
        if (bird.iFrames > 0) bird.iFrames -= dt;

        spawnTimer += dt * 16.67;
        if (spawnTimer >= PIPE_SPAWN_MS) {
            const gap = 220, topH = Math.floor(Math.random() * (CH - gap - 160)) + 60;
            pipes.push({ x: CW, topH: topH, botY: topH + gap, passed: false });
            spawnTimer = 0;

            let roll = Math.random();
            if (roll < 0.08) {
                lorincItems.push({ x: CW + 50, y: Math.random() * (CH - 150) + 75, done: false });
                playSfx(sfx.lorinc);
            }
            else if (roll > 0.90) euItems.push({ x: CW + 50, y: Math.random() * (CH - 150) + 75, done: false });
        }

        // BOSS LOGIC (Trigger every 20 points)
        if (score > 0 && score % 20 === 0 && score !== boss.lastScore) {
            boss.lastScore = score;
            boss.active = true; boss.x = CW + 60; boss.y = bird.y;
            playSfx(sfx.peter);
            showEvent("MI VAGYUNK A TISZA!", "#ffeb3b");
        }
        if (boss.active) {
            boss.x -= 4.5 * dt;
            boss.y += Math.sin(Date.now() / 150) * 3;
            if (bird.iFrames <= 0 && Math.hypot(bird.x - boss.x, bird.y - boss.y) < 60) triggerHit();
            if (boss.x < -150) boss.active = false; 
        }

        // LORINC COLLECTION
        lorincItems.forEach((o, i) => {
            o.x -= 4 * dt;
            if (!o.done && Math.hypot(bird.x - o.x, bird.y - o.y) < 50) {
                o.done = true; score += 5; ui.score.innerText = score;
                playSfx(sfx.money);
                for(let j=0; j<10; j++) particles.push({ x: o.x, y: o.y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, l: 1 });
            }
            if (o.x < -60 || o.done) lorincItems.splice(i, 1);
        });

        // EU SHIELD COLLECTION
        euItems.forEach((e, i) => {
            e.x -= PIPE_SPEED * dt;
            if (!e.done && Math.hypot(bird.x - e.x, bird.y - e.y) < 40) {
                e.done = true; bird.shielded = true;
                showEvent("BRÜSSZELI PÉNZ MEGÉRKEZETT!", "#003399");
            }
            if (e.x < -60 || e.done) euItems.splice(i, 1);
        });

        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.l -= 0.03; if(p.l <= 0) particles.splice(i,1); });

        // COLLISION DETECTION (Aspect Ratio Aware)
        const ratio = assets.imgs.avatar.naturalWidth / assets.imgs.avatar.naturalHeight;
        const hitBoxH = 45, hitBoxW = hitBoxH * ratio;

        pipes.forEach((p, i) => {
            p.x -= PIPE_SPEED * dt;
            if (bird.x + hitBoxW > p.x && bird.x - hitBoxW < p.x + PIPE_W) {
                if (bird.y - hitBoxH < p.topH || bird.y + hitBoxH > p.botY) triggerHit();
            }
            if (!p.passed && p.x + PIPE_W < bird.x) { score++; ui.score.innerText = score; p.passed = true; }
            if (p.x < -PIPE_W) pipes.splice(i, 1);
        });

        if (bird.y + 40 > CH || bird.y - 40 < 0) triggerHit();
    }

    function triggerHit() {
        if (bird.shielded) {
            bird.shielded = false; bird.iFrames = 60;
            showEvent("A PAJZS BETÖRT!", "#ffeb3b");
        } else if (bird.iFrames <= 0) {
            endGame();
        }
    }

    // --- DRAWING ---
    function draw() {
        ctx.fillStyle = '#5cacee'; ctx.fillRect(0, 0, CW, CH);

        // 3D PIPES
        pipes.forEach(p => {
            let pGrad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
            pGrad.addColorStop(0, 'rgba(0,0,0,0.5)'); pGrad.addColorStop(0.3, 'rgba(255,255,255,0.3)'); pGrad.addColorStop(1, 'rgba(0,0,0,0.6)');
            const draw3DRect = (x, y, w, h, color) => {
                ctx.fillStyle = color; ctx.fillRect(x, y, w, h);
                ctx.fillStyle = pGrad; ctx.fillRect(x, y, w, h);
                ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
            };
            draw3DRect(p.x, 0, PIPE_W, p.topH, '#ce2939'); draw3DRect(p.x - 4, p.topH - 20, PIPE_W + 8, 20, '#ffffff');
            draw3DRect(p.x, p.botY, PIPE_W, CH - p.botY, '#477050'); draw3DRect(p.x - 4, p.botY, PIPE_W + 8, 20, '#ffffff');
        });

        lorincItems.forEach(o => ctx.drawImage(assets.imgs.lorinc, o.x - 40, o.y - 40, 80, 80));
        euItems.forEach(e => ctx.drawImage(assets.imgs.eu, e.x - 30, e.y - 30, 60, 60));
        
        ctx.font = "bold 24px Arial";
        particles.forEach(p => { ctx.fillStyle = `rgba(255,215,0,${p.l})`; ctx.fillText('€', p.x, p.y); });
        
        if (boss.active) ctx.drawImage(assets.imgs.peter, boss.x - 70, boss.y - 70, 140, 140);

        // AVATAR WITH ASPECT RATIO FIX
        ctx.save(); 
        ctx.translate(bird.x, bird.y); 
        ctx.rotate(bird.rot);
        if (assets.ready) {
            let img = assets.imgs.avatar;
            let drawH = 110, drawW = drawH * (img.naturalWidth / img.naturalHeight);

            if (bird.shielded) {
                ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 20;
                ctx.beginPath(); ctx.arc(0, 0, Math.max(drawW, drawH)/1.5, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(0, 51, 153, 0.4)'; ctx.fill(); 
            }
            if (bird.iFrames > 0 && Math.floor(Date.now() / 100) % 2 === 0) ctx.globalAlpha = 0.4;
            ctx.drawImage(img, -drawW/2, -drawH/2, drawW, drawH);
        }
        ctx.restore();
    }

    function endGame() {
        if (state === 'playing') { stopAllSfx(); playSfx(sfx.war); }
        state = 'gameOver';
        if (score > highScore) { 
            highScore = score; 
            localStorage.setItem('orbanGameHighScore', highScore); 
            ui.high.innerText = `Legjobb: ${highScore}`; 
        }
        ui.msg.innerText = 'BRÜSSZEL MEGÁLLÍTOTT!';
        ui.msg.style.background = 'rgba(0,0,0,0.6)';
    }

    function loop(ts) { 
        let dt = (ts - lastTime) / 16.67; 
        lastTime = ts; 
        update(dt || 1); 
        draw(); 
        requestAnimationFrame(loop); 
    }
    requestAnimationFrame(loop);
</script>
</body>
</html>
